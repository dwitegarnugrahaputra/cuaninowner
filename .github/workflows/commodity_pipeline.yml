name: CUANin.id Commodity Data Ingestion Pipeline

on:
  push:
    branches:
      - main    # 🚀 ROBOT LANGSUNG JALAN otomatis begitu lu "git push" ke branch main!
  schedule:
    - cron: '0 0 * * *'  # 🕒 Setelah itu, dia bakal rutin jalan otomatis tiap jam 7 pagi WIB
  workflow_dispatch:     # 🛠️ Tombol "Run workflow" manual di web GitHub tetep aktif

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repositori Proyek
      uses: actions/checkout@v4

    - name: 🐍 Inisialisasi Environment Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Instalasi Dependensi Big Data Pipeline
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance pymongo dnspython supabase requests matplotlib seaborn

    - name: 🚀 Eksekusi Script Pipeline Komoditas Strategis
      env:
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python src/engineering/scrapping_pipeline.py

    - name: 🤖 Eksekusi AI Fallback (Estimasi Harga Bahan Tanpa Data Resmi)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python src/engineering/ai_fallback.py